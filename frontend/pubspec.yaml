name: honkai_star_retail
description: HSR themed retail mobile app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0

  provider: ^6.1.5+1
  lucide_icons: ^0.257.0
  uuid: ^4.5.1
  intl: ^0.19.0

  animate_do: ^3.3.9
  carousel_slider: ^5.1.2
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.2
  google_fonts: ^6.3.2
  lottie: ^3.3.1
  expandable: ^5.0.1
  shared_preferences: ^2.5.3

  google_sign_in: ^6.2.1
  change_app_package_name: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
